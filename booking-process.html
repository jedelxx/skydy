<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Skydy Study Hub - Book</title>
    <link rel="icon" type="image/png" href="images/logo.png">
    <link rel="stylesheet" href="style.css"> 
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cherry+Bomb+One&family=Google+Sans+Flex:opsz,wght@6..144,1..1000&family=Modak&family=Roboto:ital,wght@0,100..900;1,100..900&family=Sour+Gummy:ital,wght@0,100..900;1,100..900&display=swap');
        .booking-modal-overlay {
            display: flex;
            height: 100vh;
            width: 100vw;
            backdrop-filter: blur(8px); 
            -webkit-backdrop-filter: blur(8px) !important;
            background-color: rgba(15, 9, 9, 0.601);
        }
    </style>
</head>

<body>

    <div id="bg-slider"></div>
    <div id="loading-screen">
        <img src="images/logo.png" alt="Skydy Logo" class="loader-logo">
    </div>

  <div class="booking-modal-overlay">
    <div class="booking-modal-wrapper">
        <div class="booking-modal">
            <div class="modal-left">
                <h2>General Information</h2>
                <label>First name <span class="required-star">*</span></label>
                <input type="text" id="first-name" placeholder="Juan"> 
                
                <label>Middle name</label>
                <input type="text" placeholder="Dela Cruz">
                
                <div class="name-row">
                    <div class="field-half">
                        <label>Last name <span class="required-star">*</span></label>
                        <input type="text" id="last-name" placeholder="Cruz"> 
                    </div>
                    <div class="field-half">
                        <label>Suffix</label>
                        <input type="text" placeholder="Jr.">
                    </div>
                </div>

                <label>Sex <span class="required-star">*</span></label>
                <div class="sex-toggle">
                    <button>Male</button>
                    <button>Female</button>
                </div>
            </div>

            <div class="modal-right">
                <h2>Contact Details</h2>
                <label>Email Address <span class="required-star">*</span></label>
                <input type="email" id="email-address" placeholder="juan.delacruz@example.com">
                
                <label>Contact Number <span class="required-star">*</span></label>
                <div class="phone-input">
                    <span>+63</span>
                    <input type="tel" id="contact-number" placeholder="9123456789">
                </div>

                <h3>Payment Method</h3>
                <div class="payment-options">
                    <button>E-Wallet</button>
                    <button>Credit / Debit Card</button>
                </div>
            </div>
            
        </div> <div class="modal-footer">
            <button class="btn-cancel">&lt; Cancel</button>
            <button class="btn-proceed">Proceed &gt;</button>
        </div>
    </div>
    <div class="cancel-overlay" id="cancelModal" style="display: none;">
      <div class="cancel-dialog">
          
          <h2>Leaving so soon?</h2>
          <p>Your spot is going to miss you!</p>
          
          <div class="cancel-actions">
              <button class="btn-close-dialog">Close</button>
              <button class="btn-cancel-anyway">Cancel Anyway</button>
          </div>
          
      </div>
  </div> 
</div> 
<script src="booking-process.js"></script>
</body>
</html>
