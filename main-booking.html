<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Skydy Study Hub - Book</title>
    <link rel="stylesheet" href="style.css"> 
    <link rel="icon" type="image/png" href="images/logo.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cherry+Bomb+One&family=Google+Sans+Flex:opsz,wght@6..144,1..1000&family=Modak&family=Roboto:ital,wght@0,100..900;1,100..900&family=Sour+Gummy:ital,wght@0,100..900;1,100..900&display=swap');
        .container {
            display: flex;
            height: 100vh;
            backdrop-filter: blur(8px); 
            -webkit-backdrop-filter: blur(8px);
            background-color: rgba(15, 9, 9, 0.601);
        }
    </style>
</head>
<body>
    <div id="bg-slider"></div>
    <div id="loading-screen">
        <img src="images/logo.png" alt="Skydy Logo" class="loader-logo">
    </div>
    
    <div class="container">
        <a href="book.html">
            <img src="images/back-arrow.png" id="back-arrow" class="back-arrow">
        </a>
        <div class="booking-wrapper">
            <div class="booking-calendar">
                <div class="calendar-header">
                    <button id="prev-month">&lt;</button>
                    <h2 id="month-year">May 2026</h2>
                    <button id="next-month">&gt;</button>
                </div>
                <div class="calendar-grid">
                    <div class="day-name">Sun</div><div class="day-name">Mon</div>
                    <div class="day-name">Tue</div><div class="day-name">Wed</div>
                    <div class="day-name">Thu</div><div class="day-name">Fri</div>
                    <div class="day-name">Sat</div>
                    <div id="calendar-days" class="calendar-days"></div>
                </div>
                <p id="selected-date-text">Selected Date: None</p>
                <div class="seat-picker-container">
                    <label for="seat-dropdown" class="picker-label">Choose an Available Spot:</label>
                    <select id="seat-dropdown" class="picker-select">
                        <option value="" disabled selected> Select a Seat </option>
                    </select>
                </div>
                
                <a href="booking-process.html" id="process-booking-btn" class="process-booking-button disabled">Process Booking</a>
            </div>

            <div class="floor-plan-container">
                <div class="floor-plan-header">Choose Your Spot</div>
                <div class="floor-plan-map" id="floor-map"></div>
            </div>
        </div>
    </div>

    <script src="booking.js"></script>
</body>
</html>
