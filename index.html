<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Skydy Study Hub</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="images/logo.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cherry+Bomb+One&family=Google+Sans+Flex:opsz,wght@6..144,1..1000&family=Modak&family=Roboto:ital,wght@0,100..900;1,100..900&family=Sour+Gummy:ital,wght@0,100..900;1,100..900&display=swap');
        .container{
            display: flex;
            height: 100vh;
            backdrop-filter: blur(8px); 
            -webkit-backdrop-filter: blur(8px);
            background-color: rgba(15, 9, 9, 0.601);
        }
    </style>
</head>

<body>
    <div id="loading-screen">
            <img src="images/logo.png" alt="Skydy Logo" class="loader-logo">
    </div>
    <script>
        setTimeout(() => {
            const loader = document.getElementById('loading-screen');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 600); 
            }
        }, 2000);
    </script>

    <div id="bg-slider"></div>
    <div class="container">
        <nav class="sidebar collapsed">
            <div class="menu-icon">☰</div>
            <ul class="nav-links">
                <li>
                    <div class="curve-top"></div>
                    <a href="index.html">Home</a>
                    <div class="curve-bottom"></div>
                </li>
                <li>
                    <div class="curve-top"></div>
                    <a href="book.html">Spaces &amp; Rates</a>
                    <div class="curve-bottom"></div>
                </li>
                <li>
                    <div class="curve-top"></div>
                    <a href="contact.html">Contact Us</a>
                    <div class="curve-bottom"></div>
                </li>
            </ul>
            <div class="logo-container">
                <a href="index.html">
                    <img src="images/logo.png" alt="Skydy Logo" class="footer-logo">
                </a>
            </div>
        </nav>
        <div class="home-content-stack">
            <section class="slider-container">
                <div class="slider-wrapper">
                    <div class="slider">
                        <img id="feature1" src="images/skydy-cover.jpg" alt="display-cb1"/>
                        <img id="feature2" src="images/SC0.5.jpeg" alt="display-cb1"/>
                        <img id="feature3" src="images/TS2.jpeg" alt="display-cb1"/>
                        <img id="feature4" src="images/DDCloseUp.jpeg" alt="display-cb1"/>
                        <img id="feature5" src="images/Pantry1.jpeg" alt="display-cb1"/>
                        <img id="feature6" src="images/Pantry2.jpeg" alt="display-cb1"/>
                    </div>
                    <div class="slider-nav">
                        <a href="#feature1"></a>
                        <a href="#feature2"></a>
                        <a href="#feature3"></a>
                        <a href="#feature4"></a>
                        <a href="#feature5"></a>
                        <a href="#feature6"></a>
                    </div>
                </div>
            </section>
            <div class="hero-section">
                <div class="text-group">
                    <p class="tagline">Head in the skies,<br>mind on the grind</p>
                    <p class="location">📍 3F RM101 Square, Ramon Magsaysay Blvd cor D. Ampil St., Sta. Mesa, Manila</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const menuIcon = document.querySelector('.menu-icon');
        const sidebar = document.querySelector('.sidebar');
        const navLinks = document.querySelector('.nav-links');
        const logoContainer = document.querySelector('.logo-container');

        menuIcon.addEventListener('click', () => {
            sidebar.classList.toggle('collapsed');
        });
        
        document.getElementById('bg-slider').style.backgroundImage = 'url("images/wp.jpg")';

        const carousel = document.querySelector('.slider');
        const slides = document.querySelectorAll('.slider img');
        let currentSlideIndex = 0;
        let autoSlideTimer;

        function startAutoSlide() {
            autoSlideTimer = setInterval(() => {
                currentSlideIndex++;
                
                if (currentSlideIndex >= slides.length) {
                    currentSlideIndex = 0; 
                }
                carousel.scrollLeft = slides[currentSlideIndex].offsetLeft;
                
            }, 3500); 
        }

        startAutoSlide();

        const carouselContainer = document.querySelector('.slider-wrapper');
        carouselContainer.addEventListener('mouseenter', () => clearInterval(autoSlideTimer));
        carouselContainer.addEventListener('mouseleave', startAutoSlide);
        carouselContainer.addEventListener('touchstart', () => clearInterval(autoSlideTimer));
        carouselContainer.addEventListener('touchend', startAutoSlide);
    </script>
</body>
</html>
