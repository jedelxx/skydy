<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Skydy Study Hub - Payment</title>
    <link rel="icon" type="image/png" href="images/logo.png">
    <link rel="stylesheet" href="style.css">
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cherry+Bomb+One&family=Google+Sans+Flex:opsz,wght@6..144,1..1000&family=Modak&family=Roboto:ital,wght@0,100..900;1,100..900&family=Sour+Gummy:ital,wght@0,100..900;1,100..900&display=swap');
        .booking-modal-overlay {
            display: flex;
            height: 100vh;
            width: 100vw;
            backdrop-filter: blur(8px); 
            -webkit-backdrop-filter: blur(8px) !important;
            background-color: rgba(15, 9, 9, 0.601);
        }
    </style> 
</head>

<body>
    <div id="bg-slider"></div>
    <div id="loading-screen">
        <img src="images/logo.png" alt="Skydy Logo" class="loader-logo">
    </div>

  <div class="booking-modal-overlay">
    <div class="booking-modal-wrapper">
        <div class="booking-modal">
            <div class="modal-left payment-step-left">
                <img src="images/InstaPay-Logo.webp" alt="InstaPay Logo" class="payment-logo">
                <div class="qr-wrapper">
                    <img src="images/QRCode.png" alt="QR Code">
                </div>
                
                <h3 class="scan-text">Scan to Pay</h3>
            </div>

            <div class="modal-right payment-step-right">
                
                <div class="reference-container">
                    <label>Reference Number <span class="required-star">*</span></label>
                    <input type="text" id="reference-number">
                    
                    <p class="payment-note">
                        <strong>Note:</strong> Kindly double-check your payment reference number. Incorrect reference number may result in an invalid booking.
                    </p>
                </div>

                <button class="btn-done">Done</button>
            </div>
        </div> 
      </div>
    </div> 
    <div class="confirmation-overlay" id="confirmationModal" style="display: none;">
      <div class="confirmation-wrapper">
          
          <div class="confirmation-card">
              <h2>Thank You!</h2>
              <p class="screenshot-note">Please screenshot this page to present at the<br>reception desk upon arrival.</p>
              
              <div class="details-box">
                  <div class="detail-row">
                      <span class="detail-label">Name</span>
                      <span class="detail-value">XXX-XXX-XXX-XXX</span> <!-- hardcoded  -->
                  </div>
                  <div class="detail-row">
                      <span class="detail-label">Date</span>
                      <span class="detail-value">May 26, 2026</span> <!-- hardcoded  -->
                  </div>
                  <div class="detail-row">
                      <span class="detail-label">Seat</span>
                      <span class="detail-value">FP1</span> <!-- hardcoded  -->
                  </div>
                  <div class="detail-row">
                      <span class="detail-label">Reference No.</span>
                      <span class="detail-value">XXX-XXX-XXX-XXX</span> <!-- hardcoded  -->
                  </div>
              </div>
          </div>

          <button class="btn-return">&lt; Return to Homepage</button>
          
      </div>
  </div>
<script src="booking-process-2.js"></script>
</body>
</html>
